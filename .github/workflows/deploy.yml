name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only need read for checkout — the deploy happens via the Netlify CLI directly
# using secrets, not via GitHub Pages / GitHub OIDC.
permissions:
  contents: read

# Cancel any in-flight deploy when a newer commit lands on main, so we always
# land the latest tip, not a stale mid-flight build.
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Optional Slack/Discord webhook for success notifications.
    # Set this repo secret to enable; leave it unset to skip the step silently.
    # Slack Incoming Webhook URL format: https://hooks.slack.com/services/...
    # Discord Webhook URL format:         https://discord.com/api/webhooks/...
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        # NOTE: intentionally no `cache: 'npm'` here — we use a dedicated
        # actions/cache@v4 step below with proper lock-file-aware keying
        # and restore-keys fallback. Using both would race.
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Cross-run cache for netlify-cli + Astro node_modules.
      # Uses ~/.npm and is keyed on package-lock.json so a deps change
      # triggers a rebuild. The restore-keys fallback handles the
      # cache-miss case (e.g. first deploy after a runner scale-up).
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      # `prebuild` in package.json runs scripts/sync-files.mjs which on CI
      # self-skips cleanly when the default Windows source path is missing,
      # so the build always proceeds using the Git-committed manifest + files
      # in public/files/.
      - name: Build (Astro)
        run: npm run build
        env:
          NODE_ENV: production

      # Direct Netlify CLI invocation via `npx` — avoids depending on a
      # specific third-party GitHub Action version. The `netlify-cli` package
      # is published by Netlify Inc. on npm and resolved at run time.
      - name: Install Netlify CLI
        run: npm install --no-save netlify-cli

      # Pre-flight check: print which required secrets are present (without
      # leaking values) so failure causes are obvious in the log.
      - name: Verify secrets are wired
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then echo "::error::NETLIFY_AUTH_TOKEN is missing — add it at https://github.com/npoluri1/MY_BLOG_AI/settings/secrets/actions"; exit 1; fi
          if [ -z "$NETLIFY_SITE_ID" ]; then echo "::error::NETLIFY_SITE_ID is missing — add it at https://github.com/npoluri1/MY_BLOG_AI/settings/secrets/actions"; exit 1; fi
          echo "Both NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID are present."
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify (production)
        run: npx netlify deploy --prod --dir=dist --message="GH Actions deploy @ ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # Optional Slack/Discord notification on successful deploy.
      # Slack-compat: posts `{"text": "..."}`. For Discord-compat, swap
      # the JSON body to `{"content": "..."}`. Silently skips when
      # DEPLOY_WEBHOOK_URL is unset, and never fails the workflow.
      - name: Notify deployment (optional)
        if: success()
        run: |
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            MSG="✅ *Deployed* https://my-blog-nagasiva.netlify.app/  \nCommit: \`${GITHUB_SHA}\`  \nBy: \`${GITHUB_ACTOR}\`  \nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            curl -fsS -X POST -H 'Content-Type: application/json' \
              --data "{\"text\": \"${MSG}\"}" \
              "$DEPLOY_WEBHOOK_URL" \
              || echo "::warning::DEPLOY_WEBHOOK_URL post failed (non-blocking)"
          else
            echo "::notice::DEPLOY_WEBHOOK_URL not set, skipping notification."
          fi
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
