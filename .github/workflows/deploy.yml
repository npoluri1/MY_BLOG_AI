name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only need read for checkout — the deploy happens via the Netlify Action
# using secrets, not via GitHub Pages / GitHub OIDC.
permissions:
  contents: read

# Cancel any in-flight deploy if a newer commit lands on main, so we always
# land the latest tip, not a stale mid-flight build.
concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # `prebuild` in package.json runs scripts/sync-files.mjs which on CI
      # self-skips cleanly when SYNC_SOURCE_DIR is missing or empty (no
      # Windows-only path), so the build always proceeds using the
      # Git-committed manifest + files in public/files/.
      - name: Install dependencies
        run: npm ci

      - name: Build (Astro)
        run: npm run build
        env:
          NODE_ENV: production

      # Official Netlify GitHub Action — runs `netlify deploy --prod`
      # inside this step using NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID.
      - name: Deploy to Netlify (production)
        uses: netlify/actions/cli@v2.0
        with:
          args: >-
            deploy --prod
            --dir=dist
            --message="GH Actions deploy @ ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
